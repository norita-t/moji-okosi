<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>transcribe — 音声文字起こし</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #efefec;
    --text: #1a1a1a;
    --text2: #6b6b68;
    --text3: #a0a09c;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --bg3: #3a3a3c;
      --text: #f0f0ee;
      --text2: #9a9a98;
      --text3: #686866;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
    }
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  /* top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 0.5px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text); }
  .brand-name { font-size: 15px; font-weight: 500; letter-spacing: 0.04em; }
  .brand-sub { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* panels */
  .panel {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .panel-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    font-family: 'DM Mono', monospace;
  }

  /* api key */
  .apikey-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .apikey-input {
    flex: 1;
    padding: 8px 12px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg2);
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    outline: none;
  }
  .apikey-input:focus { border-color: var(--text3); }
  .apikey-toggle {
    padding: 7px 12px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg2);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .apikey-toggle:hover { background: var(--bg3); }
  .apikey-hint {
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
  }
  .apikey-hint a { color: var(--text2); }

  /* drop area */
  .drop-area {
    border: 0.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 1.75rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    background: var(--bg2);
  }
  .drop-area:hover, .drop-area.over { background: var(--bg3); border-color: var(--text3); }
  .drop-area input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 28px; color: var(--text3); margin-bottom: 8px; }
  .drop-main { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .drop-hint-text { font-size: 12px; color: var(--text3); }
  .source-row {
    display: flex; gap: 6px; margin-top: 12px; justify-content: center; flex-wrap: wrap;
  }
  .src-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 13px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg);
    font-size: 12px; cursor: pointer; color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.1s;
    position: relative; z-index: 2;
  }
  .src-btn:hover { background: var(--bg2); }

  /* file pill */
  .file-pill {
    display: none; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin-top: 10px;
  }
  .file-pill.show { display: flex; }
  .file-pill-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-pill-size { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .rm-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; display: flex; align-items: center; }
  .rm-btn:hover { color: var(--text); }

  /* options */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .opt-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; display: block; }
  .opt-select {
    width: 100%; font-size: 13px; padding: 7px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg2);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
  }

  /* run button */
  .run-btn {
    width: 100%; padding: 13px;
    background: var(--text);
    color: var(--bg);
    border: none; border-radius: var(--radius);
    font-size: 14px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.02em;
    transition: opacity 0.15s;
    margin-bottom: 1rem;
  }
  .run-btn:disabled { opacity: 0.28; cursor: not-allowed; }
  .run-btn:not(:disabled):hover { opacity: 0.8; }

  /* progress */
  .prog { display: none; margin-bottom: 1rem; }
  .prog.show { display: block; }
  .prog-track { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-bottom: 6px; }
  .prog-fill { height: 100%; background: var(--text); border-radius: 1px; width: 0%; transition: width 0.4s; }
  .prog-lbl { font-size: 11px; color: var(--text3); text-align: center; font-family: 'DM Mono', monospace; }

  /* error */
  .error-box {
    display: none;
    padding: 10px 14px;
    background: #fff0f0;
    border: 0.5px solid #f5c1c1;
    border-radius: var(--radius);
    font-size: 13px;
    color: #a32d2d;
    margin-bottom: 1rem;
  }
  .error-box.show { display: block; }
  @media (prefers-color-scheme: dark) {
    .error-box { background: #3a1f1f; border-color: #6b2d2d; color: #f09595; }
  }

  /* result */
  .result { display: none; }
  .result.show { display: block; }
  .result-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .result-meta { display: flex; align-items: center; gap: 8px; }
  .result-tag {
    font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 3px 8px;
    background: #eaf3de; color: #27500a;
    border-radius: var(--radius);
  }
  @media (prefers-color-scheme: dark) {
    .result-tag { background: #1e3010; color: #97c459; }
  }
  .result-count { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .act-row { display: flex; gap: 6px; }
  .act-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 11px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg);
    font-size: 12px; cursor: pointer; color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.1s;
  }
  .act-btn:hover { background: var(--bg2); }

  /* speaker pills */
  .sp-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .sp-pill { font-size: 11px; font-family: 'DM Mono', monospace; padding: 3px 10px; border-radius: 999px; border: 0.5px solid var(--border); }
  .sp-A { background: #e6f1fb; color: #0c447c; }
  .sp-B { background: #eaf3de; color: #27500a; }
  .sp-C { background: #faeeda; color: #633806; }
  .sp-D { background: #fbeaf0; color: #72243e; }
  .sp-E { background: #eeedfe; color: #3c3489; }
  .sp-F { background: #e1f5ee; color: #085041; }

  /* transcript */
  .transcript {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .utt { display: grid; grid-template-columns: 56px 1fr; border-bottom: 0.5px solid var(--border); }
  .utt:last-child { border-bottom: none; }
  .utt-left {
    padding: 14px 0 14px 14px;
    display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
    border-right: 0.5px solid var(--border);
  }
  .sp-badge {
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
    padding: 2px 7px; border-radius: var(--radius);
  }
  .ts { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .utt-text { padding: 14px; font-size: 13px; line-height: 1.8; color: var(--text); }

  /* notice */
  .notice {
    display: flex; gap: 8px;
    padding: 10px 12px;
    background: var(--bg2);
    border-radius: var(--radius);
    font-size: 11px; color: var(--text3); line-height: 1.6;
    margin-bottom: 1rem;
  }

  /* Google Drive modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem; width: 340px; max-width: 90vw;
  }
  .modal-box h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .modal-box p { font-size: 12px; color: var(--text2); margin-bottom: 1rem; line-height: 1.6; }
  .modal-input {
    width: 100%; padding: 7px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg2); color: var(--text);
    font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    margin-bottom: 10px; outline: none;
  }
  .modal-acts { display: flex; justify-content: flex-end; gap: 8px; }
  .modal-cancel {
    padding: 6px 14px; border: 0.5px solid var(--border2);
    border-radius: var(--radius); background: none; color: var(--text2);
    font-size: 12px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  }
  .modal-ok {
    padding: 6px 14px; background: var(--text); color: var(--bg);
    border: none; border-radius: var(--radius);
    font-size: 12px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  }

  svg.icon { width: 16px; height: 16px; vertical-align: -3px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<div class="container">

  <!-- top bar -->
  <div class="top-bar">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">transcribe</span>
    </div>
    <span class="brand-sub">話者識別 / 文字起こし</span>
  </div>

  <!-- API Key -->
  <div class="panel">
    <div class="panel-label">AssemblyAI API キー</div>
    <div class="apikey-row">
      <input type="password" class="apikey-input" id="apiKey" placeholder="あなたのAPIキーを入力..." autocomplete="off" />
      <button class="apikey-toggle" id="toggleKey">表示</button>
    </div>
    <div class="apikey-hint">
      APIキーは <a href="https://www.assemblyai.com/app" target="_blank">assemblyai.com/app</a> で取得できます（無料・クレカ不要）
    </div>
  </div>

  <!-- File upload -->
  <div class="panel">
    <div class="panel-label">音声ファイル</div>
    <div class="drop-area" id="dropArea">
      <input type="file" id="fileInput" accept="audio/*,video/*" />
      <div class="drop-icon">
        <svg class="icon" style="width:28px;height:28px" viewBox="0 0 24 24"><path d="M12 16V4m0 0l-4 4m4-4l4 4"/><path d="M4 20h16"/></svg>
      </div>
      <div class="drop-main">ここにファイルをドロップ</div>
      <div class="drop-hint-text">mp3 / m4a / wav / mp4 など</div>
      <div class="source-row">
        <button class="src-btn" id="localBtn">
          <svg class="icon" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>
          PCから選択
        </button>
        <button class="src-btn" id="gdriveBtn" style="color:#4285F4">
          <svg class="icon" viewBox="0 0 24 24" style="color:#4285F4"><path d="M12 2L2 19h7l3-5 3 5h7L12 2z"/><path d="M8.5 14l-3.3 5.5"/><path d="M15.5 14l3.3 5.5"/></svg>
          Google ドライブ
        </button>
      </div>
    </div>
    <div class="file-pill" id="filePill">
      <svg class="icon" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span class="file-pill-name" id="fileName">—</span>
      <span class="file-pill-size" id="fileSize"></span>
      <button class="rm-btn" id="rmBtn" title="削除">
        <svg class="icon" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- Options -->
  <div class="two-col">
    <div class="panel" style="margin-bottom:0">
      <span class="opt-label">話者の数</span>
      <select class="opt-select" id="spCount">
        <option value="0">自動検出</option>
        <option value="2">2人</option>
        <option value="3">3人</option>
        <option value="4">4人</option>
        <option value="5">5人</option>
        <option value="6">6人</option>
      </select>
    </div>
    <div class="panel" style="margin-bottom:0">
      <span class="opt-label">言語</span>
      <select class="opt-select" id="lang">
        <option value="ja">日本語</option>
        <option value="en">英語</option>
        <option value="zh">中国語</option>
        <option value="ko">韓国語</option>
        <option value="auto">自動検出</option>
      </select>
    </div>
  </div>
  <div style="margin-bottom:1rem"></div>

  <!-- Run -->
  <button class="run-btn" id="runBtn" disabled>
    <svg class="icon" style="width:16px;height:16px;fill:currentColor;stroke:none" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    文字起こしを開始
  </button>

  <!-- Progress -->
  <div class="prog" id="prog">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-lbl" id="progLbl">処理中...</div>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-head">
      <div class="result-meta">
        <span class="result-tag">完了</span>
        <span class="result-count" id="uttCount"></span>
      </div>
      <div class="act-row">
        <button class="act-btn" id="copyBtn">
          <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          コピー
        </button>
        <button class="act-btn" id="dlBtn">
          <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          保存
        </button>
      </div>
    </div>
    <div class="sp-pills" id="spPills"></div>
    <div class="transcript" id="transcriptBox"></div>
    <div class="notice">
      ⚠️ 音声データはAssemblyAIのサーバーに送信されます。機密情報を含む音声の取り扱いにご注意ください。
    </div>
  </div>

</div>

<!-- Google Drive Modal -->
<div class="modal-overlay" id="gdriveOverlay">
  <div class="modal-box">
    <h3>Google ドライブから読み込む</h3>
    <p>ファイルの共有リンクまたはダウンロードURLを入力してください。<br>※ファイルは「リンクを知っている全員」に公開設定が必要です。</p>
    <input type="text" class="modal-input" id="gdriveInput" placeholder="https://drive.google.com/file/d/..." />
    <div class="modal-acts">
      <button class="modal-cancel" id="gdriveCancel">キャンセル</button>
      <button class="modal-ok" id="gdriveOk">読み込む</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['sp-A','sp-B','sp-C','sp-D','sp-E','sp-F'];

let currentFile = null;
let currentFileBlob = null;
let transcriptData = [];

const apiKeyEl = document.getElementById('apiKey');
const toggleKeyBtn = document.getElementById('toggleKey');
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const localBtn = document.getElementById('localBtn');
const gdriveBtn = document.getElementById('gdriveBtn');
const filePill = document.getElementById('filePill');
const fileNameEl = document.getElementById('fileName');
const fileSizeEl = document.getElementById('fileSize');
const rmBtn = document.getElementById('rmBtn');
const runBtn = document.getElementById('runBtn');
const prog = document.getElementById('prog');
const progFill = document.getElementById('progFill');
const progLbl = document.getElementById('progLbl');
const errorBox = document.getElementById('errorBox');
const result = document.getElementById('result');
const spPills = document.getElementById('spPills');
const uttCount = document.getElementById('uttCount');
const transcriptBox = document.getElementById('transcriptBox');
const copyBtn = document.getElementById('copyBtn');
const dlBtn = document.getElementById('dlBtn');
const gdriveOverlay = document.getElementById('gdriveOverlay');
const gdriveCancel = document.getElementById('gdriveCancel');
const gdriveOk = document.getElementById('gdriveOk');

function checkRunnable() {
  runBtn.disabled = !(apiKeyEl.value.trim() && currentFile);
}

apiKeyEl.addEventListener('input', checkRunnable);

toggleKeyBtn.addEventListener('click', () => {
  const show = apiKeyEl.type === 'password';
  apiKeyEl.type = show ? 'text' : 'password';
  toggleKeyBtn.textContent = show ? '隠す' : '表示';
});

localBtn.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });

fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) setFile(f.name, f.size, f);
});

dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('over'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('over'));
dropArea.addEventListener('drop', e => {
  e.preventDefault(); dropArea.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f.name, f.size, f);
});

function setFile(name, size, blob) {
  currentFile = { name, size };
  currentFileBlob = blob || null;
  fileNameEl.textContent = name;
  fileSizeEl.textContent = size > 0 ? (size / 1024 / 1024).toFixed(1) + ' MB' : '';
  filePill.classList.add('show');
  result.classList.remove('show');
  errorBox.classList.remove('show');
  checkRunnable();
}

rmBtn.addEventListener('click', () => {
  currentFile = null; currentFileBlob = null;
  fileInput.value = '';
  filePill.classList.remove('show');
  result.classList.remove('show');
  errorBox.classList.remove('show');
  checkRunnable();
});

gdriveBtn.addEventListener('click', e => { e.stopPropagation(); gdriveOverlay.classList.add('show'); });
gdriveCancel.addEventListener('click', () => gdriveOverlay.classList.remove('show'));
gdriveOverlay.addEventListener('click', e => { if (e.target === gdriveOverlay) gdriveOverlay.classList.remove('show'); });

gdriveOk.addEventListener('click', () => {
  const v = document.getElementById('gdriveInput').value.trim();
  if (!v) return;
  const m = v.match(/\/d\/([a-zA-Z0-9_-]+)/);
  const fileId = m ? m[1] : null;
  if (!fileId) { alert('有効なGoogle DriveのURLを入力してください'); return; }
  const downloadUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
  setFile('Google Driveのファイル', 0, null);
  currentFile.driveUrl = downloadUrl;
  gdriveOverlay.classList.remove('show');
  document.getElementById('gdriveInput').value = '';
});

function setProgress(pct, label) {
  progFill.style.width = pct + '%';
  progLbl.textContent = label;
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.classList.add('show');
  prog.classList.remove('show');
  runBtn.disabled = false;
}

function msToTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

runBtn.addEventListener('click', async () => {
  const apiKey = apiKeyEl.value.trim();
  if (!apiKey || !currentFile) return;

  runBtn.disabled = true;
  result.classList.remove('show');
  errorBox.classList.remove('show');
  prog.classList.add('show');
  setProgress(5, 'ファイルをアップロード中...');

  try {
    let audioUrl;

    if (currentFile.driveUrl) {
      audioUrl = currentFile.driveUrl;
      setProgress(20, 'Google Driveのファイルを取得中...');
    } else {
      const uploadRes = await fetch('https://api.assemblyai.com/v1/upload', {
        method: 'POST',
        headers: { authorization: apiKey },
        body: currentFileBlob,
      });
      if (!uploadRes.ok) {
        const err = await uploadRes.json().catch(() => ({}));
        throw new Error(err.error || `アップロード失敗 (${uploadRes.status})`);
      }
      const uploadData = await uploadRes.json();
      audioUrl = uploadData.upload_url;
      setProgress(30, '音声を解析中...');
    }

    const spCountVal = parseInt(document.getElementById('spCount').value);
    const langVal = document.getElementById('lang').value;

    const transcriptBody = {
      audio_url: audioUrl,
      speaker_labels: true,
      language_code: langVal === 'auto' ? undefined : langVal,
    };
    if (spCountVal > 0) transcriptBody.speakers_expected = spCountVal;

    const transcriptRes = await fetch('https://api.assemblyai.com/v2/transcript', {
      method: 'POST',
      headers: { authorization: apiKey, 'content-type': 'application/json' },
      body: JSON.stringify(transcriptBody),
    });
    if (!transcriptRes.ok) {
      const err = await transcriptRes.json().catch(() => ({}));
      throw new Error(err.error || `文字起こし開始失敗 (${transcriptRes.status})`);
    }
    const transcriptJob = await transcriptRes.json();
    const jobId = transcriptJob.id;

    setProgress(40, '文字起こし中... (しばらくかかります)');

    let pollCount = 0;
    while (true) {
      await new Promise(r => setTimeout(r, 3000));
      pollCount++;

      const pollRes = await fetch(`https://api.assemblyai.com/v2/transcript/${jobId}`, {
        headers: { authorization: apiKey },
      });
      const pollData = await pollRes.json();

      if (pollData.status === 'completed') {
        setProgress(100, '完了');
        setTimeout(() => { prog.classList.remove('show'); }, 400);
        showResult(pollData);
        break;
      } else if (pollData.status === 'error') {
        throw new Error('文字起こしエラー: ' + (pollData.error || '不明なエラー'));
      } else {
        const pct = Math.min(40 + pollCount * 3, 90);
        setProgress(pct, '文字起こし中...');
      }
    }
  } catch (e) {
    showError('エラー: ' + e.message);
  }
});

function showResult(data) {
  const utterances = data.utterances || [];
  transcriptData = utterances;

  const speakers = [...new Set(utterances.map(u => u.speaker))].sort();
  spPills.innerHTML = speakers.map((s, i) => `<span class="sp-pill ${COLORS[i] || 'sp-A'}">${s}</span>`).join('');
  uttCount.textContent = utterances.length + ' 発話';

  if (utterances.length === 0) {
    transcriptBox.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--text3);font-size:13px">話者情報が取得できませんでした。テキスト全文:<br><br>${data.text || '（テキストなし）'}</div>`;
  } else {
    transcriptBox.innerHTML = utterances.map((u, i) => {
      const colorClass = COLORS[speakers.indexOf(u.speaker)] || 'sp-A';
      return `<div class="utt">
        <div class="utt-left">
          <span class="sp-badge ${colorClass}">${u.speaker}</span>
          <span class="ts">${msToTime(u.start)}</span>
        </div>
        <div class="utt-text">${u.text}</div>
      </div>`;
    }).join('');
  }

  result.classList.add('show');
  runBtn.disabled = false;
}

copyBtn.addEventListener('click', () => {
  let text;
  if (transcriptData.length > 0) {
    text = transcriptData.map(u => `(${u.speaker})：${u.text}`).join('\n');
  } else {
    text = '(文字起こし結果なし)';
  }
  navigator.clipboard.writeText(text).then(() => {
    copyBtn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> コピー済み`;
    setTimeout(() => {
      copyBtn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> コピー`;
    }, 2000);
  });
});

dlBtn.addEventListener('click', () => {
  let text;
  if (transcriptData.length > 0) {
    text = transcriptData.map(u => `(${u.speaker})：${u.text}`).join('\n');
  } else {
    text = '(文字起こし結果なし)';
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain;charset=utf-8' }));
  a.download = 'transcript.txt';
  a.click();
});
</script>
</body>
</html>
